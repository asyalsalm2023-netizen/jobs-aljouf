<body>

<h1>إضافة وظيفة جديدة</h1>

<input id="title" placeholder="اسم الوظيفة">

<input id="city" placeholder="المدينة">

<input id="education" placeholder="المؤهل">

<input id="salary" placeholder="الراتب">

<input id="link" placeholder="رابط التقديم">

<button onclick="saveJob()">نشر الوظيفة</button>

<script>

function saveJob(){

const job={

title:title.value,

city:city.value,

education:education.value,

salary:salary.value,

link:link.value

};

let jobs=JSON.parse(localStorage.getItem("jobs"))||[];

jobs.unshift(job);

localStorage.setItem("jobs",JSON.stringify(jobs));

alert("تم نشر الوظيفة");

}

</script>

</body>
